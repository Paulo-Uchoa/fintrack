services:
  db:
    image: postgres:16-alpine
    container_name: fintrack-db
    environment:
      POSTGRES_DB: fintrack
      POSTGRES_USER: fintrack
      POSTGRES_PASSWORD: fintrack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: fintrack-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/fintrack
      DB_USERNAME: fintrack
      DB_PASSWORD: fintrack
      FINTRACK_JWT_SECRET: Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tdGhpcy1pcy1hLWRldi1zZWNyZXQ=
    ports:
      - "8080:8080"

  web:
    build: ./frontend
    container_name: fintrack-web
    depends_on:
      - api
    ports:
      - "4200:80"

volumes:
  pgdata:
