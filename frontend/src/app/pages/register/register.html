<div class="auth">
  <form class="auth-card card" [formGroup]="form" (ngSubmit)="submit()">
    <div class="brand">
      <span class="logo">₿</span>
      <h1>FinTrack</h1>
    </div>
    <p class="muted subtitle">Create your account</p>

    <div class="field">
      <label for="name">Name</label>
      <input id="name" type="text" formControlName="name" placeholder="Your name" />
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" placeholder="you@example.com" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password" placeholder="At least 6 characters" />
    </div>

    @if (error()) {
      <p class="error-text">{{ error() }}</p>
    }

    <button class="btn full" type="submit" [disabled]="loading()">
      {{ loading() ? 'Creating…' : 'Create account' }}
    </button>

    <p class="muted switch">Already have an account? <a routerLink="/login">Sign in</a></p>
  </form>
</div>
